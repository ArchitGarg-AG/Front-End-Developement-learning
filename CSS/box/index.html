<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Box Model</title>

  <style>
    * {
      margin: 0;
      padding: 0;
    }
    .pad {
      
      height: 50px;
      width: 50px;
      padding: 5px;
      margin: 5px;
      box-sizing: border-box;
    }

    #first {
      border: 2px solid black;
      border-radius: 10px;
      background-color: lightblue;
    }

    #second {
      border: 3px solid gold;
      border-radius: 15px;
      background-color: lightcoral;
    }


  </style>

</head>
<body>
  <div id="first" class="pad">First checker</div>
  <div id="second" class="pad">Second checker</div>
  
</body>
</html>

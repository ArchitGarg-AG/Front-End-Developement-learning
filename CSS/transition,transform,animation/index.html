<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pseudo classes</title>

  <style>

    .pseudo {
      height: 25px;
      width:150px;
      background-color: #3498db;
      border: 2px solid black;
      border-radius: 8px;

      transition-property: all;
      transition-duration: 1s;
      transition-timing-function: ease-in-out;
      transition-delay: 0s;

      /* trasition: all 1s ease-in-out 0s; */
    }

    .pseudo:hover {
      height: 30px;
      width: 160px;
      background-color: orange;
    }

    .pseudo:active {
      height: 20px;
      width: 140px;
      background-color: hotpink;
    }

    .box {
      height: 50px;
      width: 50px;
      background-color: #3498db;
      border: 2px solid black;
      border-radius: 8px;
      position:relative;
      top: 50px;
      left: 50px;

      animation-name: ghumamkhad;
      animation-duration: 1s;
      animation-timing-function: ease-in-out;
      animation-delay: 0s;
      animation-iteration-count: 6;
      animation-direction: alternate;

      /* animation: ghumamkhad 1s ease-in-out 0s 6 alternate; */

      /* transition: all 0.1s ease-in; */

    } 
    /* .box:hover {
      transform: rotate(270deg);
      transform: scale(2);
      transform: translate(50px, 50px);
      transform: skew(90deg);
    } */

    @keyframes ghumamkhad {
      from {left: 10px};
      to {left: 200px};

    }


  </style>

</head>
<body>
  <button class="pseudo"> Learning Pseudo</button>

  <div class="box">Rotate</div>
  
</body>
</html>
